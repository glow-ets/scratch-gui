name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
    - run: npm ci

    - name: Lint
      run: npm run test:lint

    - name: Unit tests
      run: npm run test:unit

    - name: Build
      run: npm run build
      env:
        NODE_ENV: production

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: build
        path: build/
        retention-days: 5

    - name: Smoke tests (glow)
      run: npm run test:smoke:glow
